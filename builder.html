<!DOCTYPE html>
<html>
<head>
<title>AI Builder</title>

<style>
body {
    margin:0;
    font-family:Arial;
    display:flex;
    height:100vh;
}

/* LEFT PANEL */
.left {
    width:40%;
    padding:20px;
    border-right:1px solid #eee;
}

textarea {
    width:100%;
    height:100px;
    padding:10px;
}

button {
    padding:10px 20px;
    background:black;
    color:white;
    border:none;
    margin-top:10px;
}

/* RIGHT PANEL */
.right {
    flex:1;
    display:flex;
    flex-direction:column;
}

.logs {
    height:40%;
    overflow:auto;
    border-bottom:1px solid #eee;
    padding:10px;
    background:#fafafa;
}

.preview {
    flex:1;
}

iframe {
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>

<body>

<!-- LEFT -->
<div class="left">
    <h2>⚡ AI Builder</h2>

    <textarea id="idea" placeholder="Enter your idea..."></textarea>

    <button onclick="build()">Generate</button>
</div>

<!-- RIGHT -->
<div class="right">
    <div class="logs" id="logs">Logs...</div>
    <div class="preview">
        <iframe id="frame"></iframe>
    </div>
</div>

<script>
let current_id = null;

async function build(){
    let idea = document.getElementById("idea").value;

    let res = await fetch("/build", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({idea})
    });

    let data = await res.json();
    current_id = data.build_id;

    log("🚀 Build started: " + current_id);

    check();
}

function log(msg){
    document.getElementById("logs").innerHTML += "<br>" + msg;
}

async function check(){
    if(!current_id) return;

    let res = await fetch("/build-status/" + current_id);
    let data = await res.json();

    log("⏳ " + data.status);

    if(data.status === "done"){
        log("✅ Done");

        document.getElementById("frame").src = "/preview/" + current_id;
    } else {
        setTimeout(check, 2000);
    }
}
</script>

</body>
</html>
