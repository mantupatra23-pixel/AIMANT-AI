<!DOCTYPE html>
<html>
<head>
<title>AIMANT AI Builder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: sans-serif; }
.glow { box-shadow: 0 0 15px #8b5cf6; }
</style>

</head>

<body class="bg-gray-900 text-white flex h-screen overflow-hidden">

<!-- SIDEBAR -->
<div class="w-64 bg-black p-4 border-r border-gray-800">

<h2 class="text-xl font-bold text-purple-400 mb-6">⚡ AIMANT AI</h2>

<div id="steps" class="space-y-3 text-sm">
<div>⏳ Analyze Idea</div>
<div>⏳ Generate Features</div>
<div>⏳ Backend</div>
<div>⏳ Frontend</div>
<div>⏳ Deploy</div>
</div>

</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col p-4">

<h1 class="text-2xl mb-4">🚀 Live AI Builder</h1>

<!-- PROGRESS -->
<div class="mb-4">
<div class="w-full bg-gray-700 rounded h-3 overflow-hidden">
<div id="bar" class="bg-purple-600 h-3 w-0 transition-all duration-500 glow"></div>
</div>
<p id="status" class="text-xs text-gray-400 mt-1">Starting...</p>
</div>

<!-- LOGS -->
<div id="logs" class="bg-black/60 p-3 h-32 overflow-auto text-xs rounded mb-4">
Waiting...
</div>

<!-- TABS -->
<div class="flex gap-2 mb-2">
<button onclick="show('frontend')" class="bg-blue-600 px-3 py-1 rounded">Frontend</button>
<button onclick="show('backend')" class="bg-green-600 px-3 py-1 rounded">Backend</button>
<button onclick="show('monetization')" class="bg-yellow-600 px-3 py-1 rounded">Money</button>
</div>

<!-- CODE VIEW -->
<textarea id="code" class="w-full flex-1 bg-black p-3 text-xs rounded resize-none"></textarea>

<!-- ACTION -->
<div class="mt-3 flex gap-3">
<button onclick="download()" class="bg-purple-600 px-4 py-2 rounded">Download</button>
<button onclick="deploy()" class="bg-green-600 px-4 py-2 rounded">Deploy</button>
</div>

<p id="live" class="mt-2 text-green-400"></p>

</div>

<script>

let build_id = localStorage.getItem("build_id")
let current = {}

function updateUI(step){
    let steps = ["start","features","backend","frontend","deploy","done"]
    let index = steps.indexOf(step)

    let percent = ((index+1)/steps.length)*100
    document.getElementById("bar").style.width = percent+"%"
    document.getElementById("status").innerText = step

    let labels = [
        "Analyze Idea",
        "Generate Features",
        "Backend",
        "Frontend",
        "Deploy"
    ]

    let html=""
    labels.forEach((l,i)=>{
        if(i<=index) html+=`<div>✅ ${l}</div>`
        else html+=`<div>⏳ ${l}</div>`
    })

    document.getElementById("steps").innerHTML = html
}

async function fetchStatus(){
    let res = await fetch("/build-status/"+build_id)
    let d = await res.json()

    current = d.data || {}

    updateUI(d.status || "start")

    document.getElementById("logs").innerHTML =
        (d.logs||[]).join("<br>")

    if(d.status=="done"){
        document.getElementById("status").innerText="✅ Completed"
        document.getElementById("code").value = current.frontend || ""
    } else {
        setTimeout(fetchStatus,2000)
    }
}

function show(type){
    document.getElementById("code").value = current[type] || ""
}

function download(){
    window.open("/download/"+build_id)
}

async function deploy(){
    await fetch("/deploy/"+build_id,{method:"POST"})
    checkDeploy()
}

async function checkDeploy(){
    let res = await fetch("/deploy-status/"+build_id)
    let d = await res.json()

    if(d.url){
        document.getElementById("live").innerText = "🌍 "+d.url
    } else {
        setTimeout(checkDeploy,2000)
    }
}

fetchStatus()

</script>

</body>
</html>
