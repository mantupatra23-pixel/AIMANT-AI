<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mantu AI Builder</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  display:flex;
  height:100vh;
  background:#f8fafc;
}

/* LEFT PANEL */
.left{
  width:35%;
  background:white;
  padding:25px;
  border-right:1px solid #eee;
}

.left h2{
  margin-bottom:15px;
}

textarea{
  width:100%;
  height:180px;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  outline:none;
}

button{
  margin-top:15px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#00c896;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#00b383;
}

/* RIGHT PANEL */
.right{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* LOGS */
.logs{
  height:40%;
  background:#111;
  color:#00ff88;
  padding:15px;
  overflow:auto;
  font-size:13px;
}

/* PREVIEW */
.preview{
  flex:1;
  background:white;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<!-- LEFT -->
<div class="left">
  <h2>🧠 Mantu AI Builder</h2>

  <textarea id="prompt" placeholder="Describe changes..."></textarea>

  <button onclick="edit()">Update App 🚀</button>
</div>

<!-- RIGHT -->
<div class="right">

  <div class="logs" id="logs">
    Logs will appear here...
  </div>

  <div class="preview">
    <iframe id="frame"></iframe>
  </div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://tajgxsdzjnnvoifcymdx.supabase.co",
  "YOUR_ANON_KEY"
);

// SESSION CHECK
const { data: { session } } = await supabase.auth.getSession();

if (!session) {
  alert("Login required");
  window.location.href = "login.html";
}

const token = session.access_token;

let current_id = localStorage.getItem("build_id");

// LOG FUNCTION
function log(msg){
  document.getElementById("logs").innerHTML += "<div>👉 "+msg+"</div>";
}

// 🚀 UPDATE APP
window.edit = async function(){

  let prompt = document.getElementById("prompt").value;

  if(!prompt){
    alert("Enter prompt");
    return;
  }

  let res = await fetch("https://aimant-ai.onrender.com/ai-edit",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body:JSON.stringify({
      build_id: current_id,
      prompt: prompt
    })
  });

  let data = await res.json();

  log("🚀 Update sent...");
  check();
};

// 🔍 CHECK STATUS
async function check(){

  if(!current_id) return;

  let res = await fetch(`https://aimant-ai.onrender.com/status/${current_id}`,{
    headers:{
      "Authorization":"Bearer "+token
    }
  });

  let data = await res.json();

  log("⏳ "+data.status);

  if(data.status === "live"){
    log("✅ App Ready!");

    document.getElementById("frame").src = data.deployment_url;

  }else{
    setTimeout(check,2000);
  }
}

// AUTO LOAD
check();

</script>

</body>
</html>
