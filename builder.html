<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIMANT AI Builder</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#020617);
    color:white;
}

.header {
    padding:15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.container {
    padding:15px;
}

input {
    width:100%;
    padding:14px;
    border-radius:10px;
    border:none;
    background:#111827;
    color:white;
    margin-bottom:10px;
}

button {
    padding:12px 18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.build-btn {
    background:linear-gradient(45deg,#6366f1,#8b5cf6);
    color:white;
}

.deploy-btn {
    background:#22c55e;
    color:white;
}

.progress {
    height:6px;
    background:#1e293b;
    margin-top:10px;
    border-radius:10px;
    overflow:hidden;
}

.progress-bar {
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#6366f1,#22c55e);
    animation:move 2s infinite;
}

@keyframes move {
    0% {width:10%}
    50% {width:80%}
    100% {width:10%}
}

.card {
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}

.logs {
    height:200px;
    overflow:auto;
    background:black;
    padding:10px;
    font-size:12px;
    border-radius:10px;
}

.code {
    height:250px;
    overflow:auto;
    background:black;
    padding:10px;
    font-size:12px;
    border-radius:10px;
}

.tabs button {
    margin-right:5px;
}

.active {
    background:#6366f1;
    color:white;
}

</style>
</head>

<body>

<div class="header">
    <h3>🚀 AIMANT AI Builder</h3>
    <button onclick="logout()">Logout</button>
</div>

<div class="container">

<input id="idea" placeholder="Enter your SaaS idea...">

<button class="build-btn" onclick="startBuild()">Build</button>

<div class="progress">
    <div class="progress-bar" id="progress"></div>
</div>

<div class="card">
    <h4>📡 Live Logs</h4>
    <div id="logs" class="logs"></div>
</div>

<div class="card">
    <div class="tabs">
        <button onclick="showTab('frontend')" id="tab1">Frontend</button>
        <button onclick="showTab('backend')" id="tab2">Backend</button>
    </div>

    <div id="frontend" class="code"></div>
    <div id="backend" class="code" style="display:none;"></div>
</div>

<button class="deploy-btn" onclick="deploy()">Deploy</button>

</div>

<script>

let buildId = null;

function log(msg){
    let box = document.getElementById("logs");
    box.innerHTML += msg + "<br>";
    box.scrollTop = box.scrollHeight;
}

function startBuild(){
    let idea = document.getElementById("idea").value;

    fetch("/start-build",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({idea})
    })
    .then(r=>r.json())
    .then(d=>{
        buildId = d.build_id;
        log("🚀 Build started...");
        poll();
    });
}

function poll(){
    let interval = setInterval(()=>{
        fetch(`/build-status/${buildId}`)
        .then(r=>r.json())
        .then(data=>{
            if(data.logs){
                document.getElementById("logs").innerHTML = data.logs.join("<br>");
            }

            if(data.data){
                document.getElementById("frontend").innerText = data.data.frontend || "";
                document.getElementById("backend").innerText = data.data.backend || "";
            }

            if(data.status === "completed"){
                log("✅ Build Completed");
                clearInterval(interval);
                document.getElementById("progress").style.width = "100%";
            }
        });
    },2000);
}

function showTab(type){
    document.getElementById("frontend").style.display="none";
    document.getElementById("backend").style.display="none";

    document.getElementById(type).style.display="block";
}

function deploy(){
    fetch("/auto-deploy",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({build_id:buildId})
    })
    .then(r=>r.json())
    .then(d=>{
        alert("Live URL: "+d.url);
    });
}

function logout(){
    location.href="/";
}

</script>

</body>
</html>
