<!DOCTYPE html>
<html>
<head>
<title>AIMANT AI</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white flex items-center justify-center h-screen">

<div class="text-center w-full max-w-xl">

<h1 class="text-4xl font-bold mb-6">🚀 AIMANT AI</h1>

<textarea id="idea" class="w-full p-3 text-black rounded"
placeholder="Enter your SaaS idea..."></textarea>

<button onclick="startBuild()" 
class="mt-4 w-full bg-purple-600 py-3 rounded text-lg hover:bg-purple-700">
Start Building
</button>

</div>

<script>
async function startBuild(){
    let idea = document.getElementById("idea").value

    if(!idea){
        alert("Enter idea first")
        return
    }

    let res = await fetch("/start-build", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({idea})
    })

    let data = await res.json()

    localStorage.setItem("build_id", data.build_id)

    window.location.href = "/builder"
}
</script>

</body>
</html>
