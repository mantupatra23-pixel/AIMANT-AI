<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mantu AI</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f5f5f5;
}

.navbar {
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  background:white;
}

button {
  padding:8px 14px;
  border:none;
  cursor:pointer;
  border-radius:6px;
}

.login-btn { background:black; color:white; }
.logout-btn { background:red; color:white; }

.center {
  display:flex;
  justify-content:center;
  align-items:center;
  height:85vh;
}

.box {
  width:90%;
  max-width:420px;
  background:white;
  padding:25px;
  border-radius:10px;
  text-align:center;
}

textarea {
  width:100%;
  height:100px;
  margin-top:15px;
}

.generate {
  margin-top:15px;
  background:#00c896;
  color:white;
}
</style>
</head>

<body>

<div class="navbar">
  <div>🚀 Mantu AI</div>
  <div id="nav-right">
    <button class="login-btn" onclick="goLogin()">Login</button>
  </div>
</div>

<div class="center">
  <div class="box">
    <h2>Build AI Apps in Seconds</h2>
    <textarea placeholder="Create AI app..."></textarea>
    <button class="generate">Generate 🚀</button>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://tajgxsdzjnnvoifcymdx.supabase.co",
  "PASTE_YOUR_REAL_ANON_KEY"
);

// ✅ CHECK SESSION (FIXED)
async function checkUser() {
  const { data: { session } } = await supabase.auth.getSession();

  if (session) {
    document.getElementById("nav-right").innerHTML = `
      <span>${session.user.email}</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    `;
  }
}

// ✅ LOGOUT
window.logout = async function () {
  await supabase.auth.signOut();
  location.reload();
}

// ✅ LOGIN PAGE REDIRECT
window.goLogin = function () {
  window.location.href = "login.html";
}

// AUTO RUN
checkUser();
</script>

</body>
</html>
