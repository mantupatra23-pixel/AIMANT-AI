<!DOCTYPE html>
<html>
<head>
<title>AI SaaS Builder</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white p-6">

<h1 class="text-3xl mb-6">🚀 AI SaaS Builder</h1>

<div class="grid grid-cols-2 gap-6">

<div>
<input id="u" placeholder="user" class="w-full p-2 text-black mb-2">
<input id="p" placeholder="pass" class="w-full p-2 text-black mb-2">

<button onclick="signup()" class="bg-green-500 p-2 w-full">Signup</button>
<button onclick="login()" class="bg-blue-500 p-2 w-full mt-2">Login</button>
<button onclick="upgrade()" class="bg-yellow-500 p-2 w-full mt-2">Upgrade</button>

<textarea id="idea" class="w-full p-2 text-black mt-4" placeholder="Enter idea"></textarea>

<button onclick="gen()" class="bg-purple-600 p-3 w-full mt-2">Generate</button>
</div>

<div>
<h3>Planner</h3><pre id="pl"></pre>
<h3>Backend</h3><pre id="be"></pre>
<h3>Frontend</h3><pre id="fe"></pre>
<h3>DevOps</h3><pre id="de"></pre>
</div>

</div>

<script>
let user=""

async function signup(){
await fetch("/signup",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:u.value,password:p.value})})
alert("signup")
}

async function login(){
user=u.value
await fetch("/login",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:u.value,password:p.value})})
alert("login")
}

async function upgrade(){
await fetch(`/upgrade?username=${user}`,{method:"POST"})
alert("pro")
}

async function gen(){
let r=await fetch("/generate",{method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user,idea:idea.value})})

let d=await r.json()
if(d.error){alert(d.error);return}

pl.innerText=d.planner
be.innerText=d.backend
fe.innerText=d.frontend
de.innerText=d.devops
}
</script>

</body>
</html>
