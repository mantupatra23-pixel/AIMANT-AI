<!DOCTYPE html>
<html>
<head>
  <title>Mantu AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin:0; font-family: Arial; background:#f5f5f5; }

    .navbar {
      display:flex;
      justify-content:space-between;
      padding:15px 25px;
      background:white;
    }

    .right { display:flex; gap:10px; }

    button {
      padding:8px 14px;
      border:none;
      cursor:pointer;
      border-radius:6px;
    }

    .login-btn { background:black; color:white; }
    .logout-btn { background:red; color:white; }

    .center {
      display:flex;
      justify-content:center;
      align-items:center;
      height:85vh;
    }

    .box {
      width:400px;
      background:white;
      padding:25px;
      border-radius:10px;
      text-align:center;
    }
  </style>
</head>

<body>

<div class="navbar">
  <div>🚀 Mantu AI</div>
  <div class="right" id="nav-right">
    <button class="login-btn" onclick="login()">Login</button>
  </div>
</div>

<div class="center">
  <div class="box">
    <h2>Build AI Apps in Seconds</h2>
    <textarea placeholder="Create AI app..." style="width:100%;height:100px;"></textarea>
  </div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://tajgxsdzjnnvoifcymdx.supabase.co",
  "PASTE_YOUR_REAL_ANON_KEY"
);

// 🔥 LOGIN
function login() {
  supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.origin
    }
  });
}

// 🔥 LOGOUT
function logout() {
  supabase.auth.signOut();
  localStorage.clear();
  location.reload();
}

// 🔥 MAIN FIX (IMPORTANT)
async function checkUser() {
  const { data } = await supabase.auth.getUser();

  if (data.user) {
    console.log("Logged in:", data.user.email);

    // UI update
    document.getElementById("nav-right").innerHTML = `
      <span>${data.user.email}</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    `;

    // 🔥 SAVE TOKEN
    const { data: sessionData } = await supabase.auth.getSession();
    if (sessionData.session) {
      localStorage.setItem("token", sessionData.session.access_token);
    }

    // 🔥 REDIRECT (optional)
    // window.location.href = "/dashboard.html";

  } else {
    console.log("Not logged in");
  }
}

// 🔥 RUN AFTER LOAD (delay fix)
setTimeout(checkUser, 1000);

</script>

</body>
</html>
