<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mantu AI</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#020617);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* CARD */
.container {
    width:90%;
    max-width:420px;
    background:#111827;
    padding:25px;
    border-radius:18px;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
    text-align:center;
}

/* TITLE */
h1 {
    margin-bottom:5px;
}

.sub {
    color:#9ca3af;
    font-size:13px;
    margin-bottom:20px;
}

/* TEXTAREA */
textarea {
    width:100%;
    height:110px;
    padding:12px;
    border-radius:10px;
    border:1px solid #374151;
    background:#020617;
    color:white;
    outline:none;
}

/* BUTTON */
button {
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#00c896;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* LOADER */
.loader {
    margin-top:15px;
    font-size:14px;
    color:#9ca3af;
}

/* OUTPUT */
.output {
    margin-top:15px;
    background:#020617;
    padding:10px;
    border-radius:10px;
    font-size:12px;
    color:#22c55e;
    text-align:left;
}
</style>
</head>

<body>

<div class="container">
    <h1>🚀 Mantu AI</h1>
    <div class="sub">Build AI Apps in Seconds</div>

    <textarea id="idea" placeholder="Describe your AI app idea..."></textarea>

    <button onclick="generateApp()">Generate App ⚡</button>

    <div id="loader" class="loader"></div>
    <div id="output" class="output"></div>
</div>

<script>
async function generateApp(){
    const idea = document.getElementById("idea").value;

    if(!idea){
        alert("Enter idea first");
        return;
    }

    document.getElementById("loader").innerText = "⚡ Building your app...";
    document.getElementById("output").innerText = "";

    try{
        const res = await fetch("/generate",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({idea: idea})
        });

        const data = await res.json();

        if(data.build_id){
            // SAVE BUILD ID
            localStorage.setItem("build_id", data.build_id);

            // REDIRECT
            window.location.href = "/dashboard";
        }else{
            document.getElementById("loader").innerText = "❌ Failed";
            document.getElementById("output").innerText = JSON.stringify(data,null,2);
        }

    }catch(e){
        document.getElementById("loader").innerText = "❌ Server Error";
    }
}
</script>

</body>
</html>
