<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIMANT AI Dashboard</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(135deg,#0f172a,#020617);
    color:white;
}

.header{
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
}

.container{
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}

button{
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.build{
    background:linear-gradient(45deg,#6366f1,#8b5cf6);
    color:white;
}

.logout{
    background:red;
    color:white;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#111827;
    color:white;
}

.stats{
    display:flex;
    gap:10px;
}

.stat{
    flex:1;
    background:#111827;
    padding:10px;
    border-radius:10px;
    text-align:center;
}
</style>
</head>

<body>

<div class="header">
    <h3>🚀 AIMANT AI</h3>
    <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="stats">
    <div class="stat">Credits: <span id="credits">0</span></div>
    <div class="stat">Projects: <span id="projects">0</span></div>
</div>

<div class="card">
    <h3>💡 Build SaaS</h3>
    <input id="idea" placeholder="Enter your SaaS idea...">
    <br><br>
    <button class="build" onclick="build()">🚀 Build Now</button>
</div>

<div class="card">
    <h3>📂 Your Projects</h3>
    <div id="list"></div>
</div>

</div>

<script>

function logout(){
    localStorage.removeItem("token");
    location.href="/landing";
}

function build(){
    let idea = document.getElementById("idea").value;

    fetch("/start-build",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":localStorage.getItem("token")
        },
        body:JSON.stringify({idea})
    })
    .then(r=>r.json())
    .then(d=>{
        localStorage.setItem("build_id", d.build_id);
        location.href="/builder";
    });
}

function load(){
    fetch("/dashboard",{
        headers:{
            "Authorization":localStorage.getItem("token")
        }
    })
    .then(r=>r.json())
    .then(d=>{
        document.getElementById("credits").innerText = d.credits;
        document.getElementById("projects").innerText = d.projects.length;

        let html="";
        d.projects.forEach(p=>{
            html += `<div>${p.idea}</div>`;
        });

        document.getElementById("list").innerHTML = html;
    });
}

load();

</script>

</body>
</html>
