<!DOCTYPE html>
<html>
<head>
<title>AIMANT AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-black text-white">

<!-- HEADER -->
<div class="flex justify-between items-center p-4 border-b border-gray-800">
<h1 class="text-2xl font-bold text-green-400">🚀 AIMANT AI</h1>
<button onclick="showPage('login')" class="text-sm">Login</button>
</div>

<!-- LOGIN PAGE -->
<div id="loginPage" class="p-6">
<h2 class="text-xl mb-3">🔐 Login</h2>
<input id="user" placeholder="Username" class="w-full p-2 text-black mb-2">
<input id="pass" placeholder="Password" class="w-full p-2 text-black mb-2">
<button onclick="login()" class="bg-green-500 w-full p-2 rounded">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden p-4">

<!-- ANALYTICS -->
<div class="grid grid-cols-2 gap-3 mb-4">
<div class="bg-gray-800 p-3 rounded">Users: <span id="users">120</span></div>
<div class="bg-gray-800 p-3 rounded">Revenue: ₹<span id="rev">5000</span></div>
</div>

<!-- IDEA INPUT -->
<textarea id="idea" class="w-full p-3 text-black rounded"
placeholder="Enter idea..."></textarea>

<div class="flex gap-2 mt-2">
<button onclick="generate()" class="bg-green-500 px-3 py-2 rounded">Generate</button>
<button onclick="showPage('payment')" class="bg-yellow-500 px-3 py-2 rounded">Upgrade</button>
</div>

<!-- OUTPUT -->
<pre id="output" class="bg-black mt-3 p-3 h-[250px] overflow-auto text-green-400"></pre>

</div>

<!-- PAYMENT PAGE -->
<div id="paymentPage" class="hidden p-6">
<h2 class="text-xl mb-3">💰 Upgrade Plan</h2>

<div class="bg-gray-800 p-4 rounded mb-3">
<h3>Pro Plan</h3>
<p>₹499/month</p>
<button onclick="pay()" class="bg-green-500 p-2 mt-2 w-full rounded">Pay Now</button>
</div>

<button onclick="showPage('dashboard')" class="text-sm text-gray-400">Back</button>
</div>

<!-- NAV -->
<div class="fixed bottom-0 w-full flex justify-around bg-gray-900 p-2">
<button onclick="showPage('dashboard')">🏠</button>
<button onclick="showPage('payment')">💰</button>
</div>

<!-- SCRIPT -->
<script>
let currentUser = ""
let data = {}

function showPage(p){
document.getElementById("loginPage").classList.add("hidden")
document.getElementById("dashboard").classList.add("hidden")
document.getElementById("paymentPage").classList.add("hidden")

if(p=="login") document.getElementById("loginPage").classList.remove("hidden")
if(p=="dashboard") document.getElementById("dashboard").classList.remove("hidden")
if(p=="payment") document.getElementById("paymentPage").classList.remove("hidden")
}

async function login(){
currentUser = user.value
showPage("dashboard")
}

async function generate(){
let res = await fetch("/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({idea: idea.value})
})

data = await res.json()

if(data.error){ alert(data.error); return }

output.innerText = data.final
}

function pay(){
alert("Payment success 🚀 (Integrate Razorpay here)")
showPage("dashboard")
}
</script>

</body>
</html>
