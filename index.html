<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<title>AIMANT AI</title>
</head>

<body class="bg-black text-white flex items-center justify-center h-screen">

<div class="w-full max-w-xl p-6 bg-white/10 backdrop-blur rounded-xl">

<h1 class="text-2xl font-bold mb-4 text-green-400">🚀 AIMANT AI</h1>

<textarea id="idea" class="w-full p-3 bg-black/40 rounded mb-4"
placeholder="Enter your SaaS idea..."></textarea>

<button onclick="startBuild()" class="w-full bg-blue-500 py-2 rounded">
Build Now 🚀
</button>

</div>

<script>
function startBuild(){
    let idea = document.getElementById("idea").value
    localStorage.setItem("idea", idea)
    window.location.href = "/builder.html"
}
</script>

</body>
</html>
