<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aimant AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: #ffffff;
    color: #111;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px 50px;
    border-bottom: 1px solid #eee;
}

.logo {
    font-weight: 600;
    font-size: 20px;
}

.btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

.btn-dark {
    background: black;
    color: white;
}

/* HERO */
.hero {
    text-align: center;
    padding: 80px 20px;
}

.hero h1 {
    font-size: 42px;
    font-weight: 600;
}

.hero p {
    margin-top: 15px;
    color: #666;
}

.input-box {
    margin-top: 30px;
}

input {
    padding: 15px;
    width: 60%;
    border-radius: 10px;
    border: 1px solid #ddd;
}

.generate {
    margin-left: 10px;
}

/* FEATURES */
.features {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 60px;
}

.card {
    padding: 30px;
    border: 1px solid #eee;
    border-radius: 15px;
    width: 250px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 30px;
    border-top: 1px solid #eee;
    color: #777;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">Aimant AI</div>
    <button class="btn btn-dark">Login</button>
</div>

<!-- HERO -->
<div class="hero">
    <h1>Build AI Apps in Seconds</h1>
    <p>Just enter your idea and get full website + backend + deploy</p>

    <div class="input-box">
        <input id="idea" placeholder="Enter your idea...">
        <button class="btn btn-dark generate" onclick="build()">Generate</button>
    </div>
</div>

<!-- FEATURES -->
<div class="features">
    <div class="card">⚡ Instant Build</div>
    <div class="card">🚀 Auto Deploy</div>
    <div class="card">💰 SaaS Ready</div>
</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 Aimant AI
</div>

<script>
async function build() {
    let idea = document.getElementById("idea").value;

    let res = await fetch("/build", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({idea})
    });

    let data = await res.json();
    alert("Build Started 🚀 ID: " + data.build_id);
}
</script>

</body>
</html>
