<!DOCTYPE html>
<html>
<head>
  <title>Mantu AI</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      text-align: center;
    }

    .box {
      width: 90%;
      max-width: 400px;
      margin: 150px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    textarea {
      width: 100%;
      height: 100px;
      margin-top: 10px;
      padding: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      background: #00cc99;
      border: none;
      color: white;
      width: 100%;
      cursor: pointer;
    }

    pre {
      text-align: left;
      background: #111;
      color: #0f0;
      padding: 10px;
      margin-top: 10px;
      overflow: auto;
    }
  </style>
</head>

<body>

<h2>🚀 Mantu AI</h2>

<div class="box">
  <h3>Build AI Apps in Seconds</h3>

  <textarea id="prompt" placeholder="Create AI app..."></textarea>

  <button onclick="generate()">Generate</button>

  <pre id="output"></pre>
</div>

<script>
async function generate() {
  let prompt = document.getElementById("prompt").value;

  let res = await fetch("https://aimant-ai.onrender.com/generate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ prompt })
  });

  let data = await res.json();

  document.getElementById("output").innerText =
    data.result || JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
