<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mantu AI Login</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* 🎥 VIDEO BACKGROUND */
video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* 🔳 CENTER BOX */
.box {
  width: 300px;
  background: white;
  padding: 25px;
  border-radius: 12px;
  margin: auto;
  margin-top: 120px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h2 {
  margin-bottom: 20px;
}

/* INPUT */
input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* BUTTONS */
button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* LOGIN */
.login {
  background: #00c896;
  color: white;
}

/* GOOGLE */
.google {
  background: white;
  border: 1px solid #ccc;
}

/* LINK */
a {
  color: #00c896;
  text-decoration: none;
}
</style>
</head>

<body>

<!-- 🎥 VIDEO -->
<video autoplay muted loop>
  <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
</video>

<!-- 🔳 LOGIN BOX -->
<div class="box">
  <h2>🚀 Mantu AI</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button class="login" onclick="login()">Login</button>

  <button class="google" onclick="googleLogin()">🔐 Login with Google</button>

  <p><a href="signup.html">Create Account</a></p>
</div>

<!-- 🔥 SCRIPT -->
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

/* 🔑 SUPABASE */
const supabase = createClient(
  "https://tajgxsdzjnnvoifcymdx.supabase.co",
  "PASTE_YOUR_REAL_ANON_KEY"
);

/* 🔐 EMAIL LOGIN */
window.login = async function () {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  let { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
  } else {
    localStorage.setItem("token", data.session.access_token);
    window.location.href = "dashboard.html";
  }
};

/* 🔥 GOOGLE LOGIN */
window.googleLogin = async function () {
  const { error } = await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: "https://aimant-ai.onrender.com/dashboard.html"
    }
  });

  if (error) {
    alert(error.message);
  }
};

/* ✅ AUTO LOGIN AFTER GOOGLE */
const { data: { session } } = await supabase.auth.getSession();

if (session) {
  localStorage.setItem("token", session.access_token);
  window.location.href = "dashboard.html";
}

</script>

</body>
</html>
