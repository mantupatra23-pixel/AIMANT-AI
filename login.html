<!DOCTYPE html>
<html>
<head>
  <title>Aimant AI Login</title>
  <style>
    body {
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(270deg,#0f2027,#203a43,#2c5364);
      background-size:600% 600%;
      animation:bgMove 10s infinite;
      font-family:Arial;
      color:white;
    }

    @keyframes bgMove {
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    .box {
      background:rgba(0,0,0,0.7);
      padding:30px;
      border-radius:15px;
      width:320px;
      text-align:center;
      backdrop-filter: blur(10px);
      animation:fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(20px);}
      to {opacity:1; transform:translateY(0);}
    }

    input {
      width:90%;
      padding:12px;
      margin:10px;
      border-radius:10px;
      border:none;
      outline:none;
    }

    button {
      width:95%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }

    .login { background:#00ffcc; }
    .google { background:white; color:black; }

    a { color:#00ffcc; }
  </style>
</head>
<body>

<div class="box">
  <h2>🚀 Aimant AI</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button class="login" onclick="login()">Login</button>

  <button class="google" onclick="googleLogin()">🔐 Login with Google</button>

  <p><a href="signup.html">Create Account</a></p>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://YOUR_PROJECT.supabase.co",
  "YOUR_ANON_KEY"
);

// 🔐 EMAIL LOGIN
window.login = async function() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  let res = await fetch("https://aimant-ai.onrender.com/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({email,password})
  });

  let data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    window.location.href="dashboard.html";
  } else {
    alert(data.error);
  }
};

// 🔥 GOOGLE LOGIN
window.googleLogin = async function () {
  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.origin + "/dashboard.html"
    }
  });
};

// ✅ AUTO LOGIN AFTER GOOGLE
const { data: { session } } = await supabase.auth.getSession();

if (session) {
  localStorage.setItem("token", session.access_token);
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
