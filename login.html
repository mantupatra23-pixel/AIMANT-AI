<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Mantu AI</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#111;
  color:white;
}

.box {
  width:320px;
  padding:25px;
  background:#222;
  border-radius:10px;
  text-align:center;
}

input {
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:6px;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.login { background:#00c896; color:white; }

.google {
  background:white;
  color:black;
}
</style>
</head>

<body>

<div class="box">
  <h2>🚀 Mantu AI</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button class="login" onclick="login()">Login</button>

  <button class="google" onclick="googleLogin()">Login with Google</button>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://tajgxsdzjnnvoifcymdx.supabase.co",
  "PASTE_YOUR_REAL_ANON_KEY"
);

// ✅ EMAIL LOGIN
window.login = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
  } else {
    window.location.href = "index.html";
  }
};

// ✅ GOOGLE LOGIN (FIXED)
window.googleLogin = async function () {
  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.origin
    }
  });
};

// ✅ AUTO REDIRECT AFTER LOGIN (VERY IMPORTANT FIX)
const { data: { session } } = await supabase.auth.getSession();
if (session) {
  window.location.href = "index.html";
}
</script>

</body>
</html>
