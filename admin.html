<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f9fafb;
}

.header{
    background:black;
    color:white;
    padding:15px;
    font-size:20px;
}

.container{
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:15px;
    border:1px solid #eee;
}

button{
    background:red;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="header">👑 Admin Panel</div>

<div class="container">

    <div class="card">
        <h3>📊 Stats</h3>
        <div id="stats"></div>
    </div>

    <div class="card">
        <h3>👥 Users</h3>
        <div id="users"></div>
    </div>

</div>

<script>
const token = localStorage.getItem("token");

// protect route
if(!token){
    window.location.href = "/auth.html";
}

// load stats
fetch("/admin/stats",{
    headers:{Authorization:token}
})
.then(res=>res.json())
.then(data=>{
    document.getElementById("stats").innerHTML =
        "Users: "+data.users+"<br>" +
        "Projects: "+data.projects+"<br>" +
        "Revenue: ₹"+data.revenue;
});

// load users
fetch("/admin/users",{
    headers:{Authorization:token}
})
.then(res=>res.json())
.then(users=>{
    let html="";
    users.forEach(u=>{
        html+=`
        <div>
            ${u.email} 
            <button onclick="block('${u.email}')">Block</button>
        </div>`;
    });
    document.getElementById("users").innerHTML=html;
});

function block(email){
    fetch("/admin/block-user",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":token
        },
        body:JSON.stringify({email})
    }).then(()=>location.reload());
}
</script>

</body>
</html>
