<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIMANT AI</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(135deg,#020617,#0f172a);
    color:white;
    text-align:center;
}

.hero{
    padding:60px 20px;
}

button{
    padding:14px 20px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

.start{
    background:linear-gradient(45deg,#6366f1,#8b5cf6);
    color:white;
}

.pricing{
    display:flex;
    gap:15px;
    padding:20px;
}

.card{
    flex:1;
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:12px;
}

.buy{
    background:#22c55e;
    color:white;
}
</style>
</head>

<body>

<div class="hero">
    <h1>🚀 Build Your SaaS in Seconds</h1>
    <p>Create full apps with AI (Frontend + Backend + Deploy)</p>
    <button class="start" onclick="go()">Start Building</button>
</div>

<div class="pricing">

<div class="card">
    <h3>Free</h3>
    <p>5 credits</p>
    <button class="buy" onclick="buy(0)">Start</button>
</div>

<div class="card">
    <h3>Pro</h3>
    <p>₹99 → 50 credits</p>
    <button class="buy" onclick="buy(99)">Buy</button>
</div>

<div class="card">
    <h3>Premium</h3>
    <p>₹299 → 200 credits</p>
    <button class="buy" onclick="buy(299)">Buy</button>
</div>

</div>

<script>

function go(){
    location.href="/";
}

function buy(amount){
    fetch("/pay",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":localStorage.getItem("token")
        },
        body:JSON.stringify({amount})
    })
    .then(r=>r.json())
    .then(d=>{
        alert("Payment Success");
    });
}

</script>

</body>
</html>
