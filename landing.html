<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIMANT AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{
    background: linear-gradient(135deg,#020617,#0f172a,#020617);
}
.glass{
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
}
</style>

</head>

<body class="text-white">

<!-- HERO -->
<div class="text-center py-20 px-4">
    <h1 class="text-5xl font-bold mb-4">🚀 AIMANT AI</h1>
    <p class="text-gray-400 mb-6">Build full SaaS apps with AI (Frontend + Backend + Deploy)</p>

    <button onclick="go()" class="bg-purple-600 px-8 py-3 rounded-xl hover:scale-105 transition">
        Start Building
    </button>
</div>

<!-- PRICING -->
<div class="grid md:grid-cols-3 gap-6 px-6 pb-20">

    <!-- FREE -->
    <div class="glass p-6 rounded-xl text-center border border-gray-700">
        <h2 class="text-xl font-bold mb-2">Free</h2>
        <p class="text-gray-400 mb-4">5 Credits</p>
        <button onclick="go()" class="bg-gray-700 px-4 py-2 rounded">
            Get Started
        </button>
    </div>

    <!-- PRO -->
    <div class="glass p-6 rounded-xl text-center border border-purple-500 scale-105">
        <h2 class="text-xl font-bold mb-2">Pro</h2>
        <p class="text-gray-400 mb-4">₹99 → 50 Credits</p>
        <button onclick="buy(99)" class="bg-purple-600 px-4 py-2 rounded hover:scale-105 transition">
            Buy Now
        </button>
    </div>

    <!-- PREMIUM -->
    <div class="glass p-6 rounded-xl text-center border border-green-500">
        <h2 class="text-xl font-bold mb-2">Premium</h2>
        <p class="text-gray-400 mb-4">₹299 → 200 Credits</p>
        <button onclick="buy(299)" class="bg-green-600 px-4 py-2 rounded hover:scale-105 transition">
            Buy Now
        </button>
    </div>

</div>

<script>

// redirect
function go(){
    window.location.href = "/"
}

// BUY FUNCTION (FINAL FIXED)
async function buy(amount){

    let res = await fetch("/create-order",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization": localStorage.getItem("token")
        },
        body:JSON.stringify({amount})
    })

    let order = await res.json()

    var options = {
        "key": "YOUR_RAZORPAY_KEY",  // 🔥 change this
        "amount": order.amount,
        "currency": "INR",
        "order_id": order.id,

        "name": "AIMANT AI",
        "description": "Upgrade Plan",

        // ✅ IMPORTANT FIX
        "notes": {
            "email": localStorage.getItem("user") || "guest"
        },

        "handler": async function (response){

            let verify = await fetch("/verify-payment",{
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "Authorization": localStorage.getItem("token")
                },
                body:JSON.stringify({
                    order_id:response.razorpay_order_id,
                    payment_id:response.razorpay_payment_id,
                    signature:response.razorpay_signature,
                    amount:amount
                })
            })

            let data = await verify.json()

            if(data.msg){
                alert("✅ Payment Success")
                location.reload()
            }else{
                alert("❌ Payment Failed")
            }
        }
    }

    var rzp = new Razorpay(options)
    rzp.open()
}

</script>

</body>
</html>
