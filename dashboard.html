<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aimant AI Dashboard</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  display: flex;
  background: #f4f6f9;
}

/* SIDEBAR */
.sidebar {
  width: 230px;
  height: 100vh;
  background: #111;
  color: white;
  padding: 20px;
}

.logo {
  font-size: 20px;
  margin-bottom: 30px;
  font-weight: bold;
}

.menu a {
  display: block;
  color: #ccc;
  text-decoration: none;
  padding: 10px;
  border-radius: 8px;
}

.menu a:hover {
  background: #222;
  color: white;
}

/* MAIN */
.main {
  flex: 1;
  padding: 25px;
}

/* TOP */
.topbar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.search {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

/* CARDS */
.cards {
  display: flex;
  gap: 20px;
  margin-bottom: 25px;
}

.card {
  flex: 1;
  background: white;
  padding: 20px;
  border-radius: 12px;
}

/* BUILD */
.build-box {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

input {
  padding: 10px;
  width: 70%;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  padding: 10px 20px;
  background: black;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.project {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">🚀 Aimant AI</div>
  <div class="menu">
    <a href="#">Dashboard</a>
    <a href="#">Projects</a>
    <a href="#">Billing</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <input class="search" placeholder="Search...">
    <div>👤 User</div>
  </div>

  <!-- STATS -->
  <div class="cards">
    <div class="card">📦 Projects: <b id="projects">0</b></div>
    <div class="card">💰 Revenue: ₹<b id="revenue">0</b></div>
    <div class="card">⚡ Credits: <b id="credits">Loading...</b></div>
  </div>

  <!-- BUILD -->
  <div class="build-box">
    <h3>Create Project</h3><br>
    <input id="idea" placeholder="Enter idea...">
    <button onclick="build()">Build</button>
  </div>

  <!-- LIST -->
  <div id="projectList"></div>

</div>

<script>

// 🔐 TOKEN
const token = localStorage.getItem("token");

if (!token) {
  alert("Login required");
  window.location.href = "/login-page";
}

// ✅ DASHBOARD LOAD (FIXED URL)
fetch("https://aimant-ai.onrender.com/dashboard", {
  headers: {
    "Authorization": token
  }
})
.then(res => res.json())
.then(data => {
  console.log(data);

  document.getElementById("credits").innerText = data.credits;
})
.catch(() => {
  alert("Unauthorized");
  window.location.href = "/login-page";
});


// 🚀 BUILD PROJECT
async function build() {
  let idea = document.getElementById("idea").value;

  if (!idea) {
    alert("Enter idea");
    return;
  }

  let res = await fetch("https://aimant-ai.onrender.com/build", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({ idea })
  });

  let data = await res.json();

  addProject(data.build_id);
}


// ➕ ADD PROJECT
function addProject(id) {
  let div = document.createElement("div");
  div.className = "project";

  div.innerHTML = `
    <span>Project ${id}</span>
    <button onclick="check('${id}')">Check</button>
  `;

  document.getElementById("projectList").appendChild(div);
}


// 🔍 CHECK STATUS
async function check(id) {
  let res = await fetch("https://aimant-ai.onrender.com/build-status/" + id, {
    headers: {
      "Authorization": token
    }
  });

  let data = await res.json();

  if (data.status === "done") {
    alert("✅ Ready!");
  } else {
    alert("⏳ Still building...");
  }
}


// 📊 LOAD STATS
async function loadStats() {
  let res = await fetch("https://aimant-ai.onrender.com/analytics", {
    headers: {
      "Authorization": token
    }
  });

  let data = await res.json();

  document.getElementById("projects").innerText = data.projects || 0;
  document.getElementById("revenue").innerText = data.revenue || 0;
}

loadStats();

</script>

</body>
</html>
