<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aimant AI Dashboard</title>

<style>
body {
  margin:0;
  font-family:Arial;
  display:flex;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* SIDEBAR */
.sidebar {
  width:220px;
  height:100vh;
  background:#111;
  padding:20px;
}

.logo {
  font-size:22px;
  font-weight:bold;
  margin-bottom:30px;
}

.menu a {
  display:block;
  color:#ccc;
  text-decoration:none;
  padding:10px;
}

.menu a:hover {
  background:#222;
  color:white;
}

/* MAIN */
.main {
  flex:1;
  padding:25px;
}

/* CARDS */
.cards {
  display:flex;
  gap:20px;
  margin-bottom:20px;
}

.card {
  flex:1;
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:12px;
  backdrop-filter: blur(10px);
  animation:fade 1s ease;
}

@keyframes fade {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

/* BUILD BOX */
.build-box {
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

input {
  padding:10px;
  width:70%;
  border:none;
  border-radius:8px;
}

button {
  padding:10px 20px;
  border:none;
  background:#00ffcc;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

#projectList div {
  margin-top:10px;
  background:#111;
  padding:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">🚀 Aimant AI</div>
  <div class="menu">
    <a href="#">Dashboard</a>
    <a href="#">Projects</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- CARDS -->
  <div class="cards">
    <div class="card">Projects: <b id="projects">0</b></div>
    <div class="card">Revenue: ₹<b id="revenue">0</b></div>
    <div class="card">Credits: <b id="credits">0</b></div>
  </div>

  <!-- BUILD -->
  <div class="build-box">
    <h3>Create Project</h3>
    <input id="idea" placeholder="Enter idea...">
    <button onclick="build()">Build</button>
  </div>

  <div id="projectList"></div>

</div>

<!-- SCRIPT -->
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://YOUR_PROJECT.supabase.co",
  "YOUR_ANON_KEY"
);

// ✅ SESSION CHECK
const { data: { session } } = await supabase.auth.getSession();

if (!session) {
  alert("Login required");
  window.location.href = "login.html";
}

// ✅ TOKEN
const token = session.access_token;

// 🚀 LOAD DASHBOARD
fetch("https://aimant-ai.onrender.com/dashboard", {
  headers: {
    "Authorization": "Bearer " + token
  }
})
.then(res => res.json())
.then(data => {
  document.getElementById("credits").innerText = data.credits || 0;
  document.getElementById("projects").innerText = data.projects || 0;
  document.getElementById("revenue").innerText = data.revenue || 0;
})
.catch(() => alert("Error loading data"));

// 🚀 BUILD PROJECT
window.build = async function() {
  let idea = document.getElementById("idea").value;

  if (!idea) {
    alert("Enter idea");
    return;
  }

  let res = await fetch("https://aimant-ai.onrender.com/start-build", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body: JSON.stringify({ idea })
  });

  let data = await res.json();

  addProject(data.build_id);
};

// ➕ ADD PROJECT
function addProject(id) {
  let div = document.createElement("div");

  div.innerHTML = `
    Project ${id}
    <button onclick="check('${id}')">Check</button>
  `;

  document.getElementById("projectList").appendChild(div);
}

// 🔍 CHECK STATUS
window.check = async function(id) {
  let res = await fetch(`https://aimant-ai.onrender.com/status/${id}`, {
    headers: {
      "Authorization":"Bearer " + token
    }
  });

  let data = await res.json();

  if (data.status === "done") {
    alert("✅ Ready!");
  } else {
    alert("⏳ Still building...");
  }
};
</script>

</body>
</html>
