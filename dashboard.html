<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mantu AI Dashboard</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#020617;
    color:white;
}

/* HEADER */
.header{
    padding:15px;
    background:#0f172a;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

/* MAIN */
.container{
    padding:20px;
}

/* CARD */
.card{
    background:#0f172a;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

/* INPUT */
input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    margin-top:10px;
}

/* BUTTON */
button{
    margin-top:10px;
    padding:10px;
    width:100%;
    border:none;
    border-radius:8px;
    background:#00c896;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* PROJECT */
.project{
    background:#111827;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
🚀 Mantu AI Dashboard
</div>

<div class="container">

<!-- CREATE APP -->
<div class="card">
    <h3>Create AI App</h3>
    <input id="idea" placeholder="Enter your AI idea">
    <button onclick="build()">Build 🚀</button>
</div>

<!-- STATUS -->
<div class="card">
    <h3>Live Status</h3>
    <p id="status">Waiting...</p>
</div>

<!-- PROJECT LIST -->
<div class="card">
    <h3>Your Projects</h3>
    <div id="projects"></div>
</div>

</div>

<script>

const projectsDiv = document.getElementById("projects");

// 🚀 BUILD APP
async function build(){
    const idea = document.getElementById("idea").value;

    if(!idea){
        alert("Enter idea");
        return;
    }

    document.getElementById("status").innerText = "⚡ Building...";

    const res = await fetch("/generate",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({idea})
    });

    const data = await res.json();

    if(data.build_id){
        localStorage.setItem("build_id", data.build_id);

        addProject(data.build_id);
        checkStatus(data.build_id);
    }else{
        alert("Error");
    }
}

// 📦 ADD PROJECT UI
function addProject(id){
    const div = document.createElement("div");

    div.className = "project";
    div.innerHTML = `
        Project ID: ${id}
        <br><br>
        <button onclick="checkStatus('${id}')">Check Status</button>
        <button onclick="openApp('${id}')">Open App</button>
    `;

    projectsDiv.appendChild(div);
}

// 🔍 CHECK STATUS
async function checkStatus(id){
    const res = await fetch(`/status/${id}`);
    const data = await res.json();

    document.getElementById("status").innerText = "Status: " + data.status;

    if(data.status !== "live"){
        setTimeout(()=>checkStatus(id),2000);
    }else{
        document.getElementById("status").innerText = "✅ LIVE";
    }
}

// 🌐 OPEN APP
function openApp(id){
    window.open(`/preview/${id}`, "_blank");
}

// 🔁 AUTO LOAD LAST BUILD
const last = localStorage.getItem("build_id");
if(last){
    addProject(last);
    checkStatus(last);
}

</script>

</body>
</html>
