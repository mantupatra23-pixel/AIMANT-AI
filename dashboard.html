<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aimant AI Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    display: flex;
    background: #f9fafb;
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    height: 100vh;
    background: #fff;
    border-right: 1px solid #eee;
    padding: 20px;
}

.logo {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 30px;
}

.menu {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.menu a {
    text-decoration: none;
    color: #333;
    padding: 10px;
    border-radius: 8px;
}

.menu a:hover {
    background: #f3f3f3;
}

/* MAIN */
.main {
    flex: 1;
    padding: 30px;
}

/* TOP BAR */
.topbar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

.search {
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
}

/* CARDS */
.cards {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
}

.card {
    flex: 1;
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #eee;
}

/* BUILD BOX */
.build-box {
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #eee;
}

input {
    width: 80%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
}

button {
    padding: 12px 20px;
    background: black;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* PROJECT LIST */
.projects {
    margin-top: 20px;
}

.project {
    background: #fff;
    padding: 15px;
    border: 1px solid #eee;
    border-radius: 10px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">🚀 Aimant AI</div>
    <div class="menu">
        <a href="#">Dashboard</a>
        <a href="#">Projects</a>
        <a href="#">Billing</a>
        <a href="#">Settings</a>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOP -->
    <div class="topbar">
        <input class="search" placeholder="Search...">
        <div>👤 User</div>
    </div>

    <!-- STATS -->
    <div class="cards">
        <div class="card">📦 Projects: <b id="projects">0</b></div>
        <div class="card">💰 Revenue: ₹<b id="revenue">0</b></div>
        <div class="card">⚡ Status: Active</div>
    </div>

    <!-- BUILD -->
    <div class="build-box">
        <h3>Create New Project</h3><br>
        <input id="idea" placeholder="Enter idea...">
        <button onclick="build()">Build</button>
    </div>

    <!-- PROJECTS -->
    <div class="projects" id="projectList"></div>

</div>

<script>

async function build() {
    let idea = document.getElementById("idea").value;

    let res = await fetch("/build", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({idea})
    });

    let data = await res.json();

    addProject(data.build_id);
}

function addProject(id) {
    let div = document.createElement("div");
    div.className = "project";
    div.innerHTML = `
        <span>Project ${id}</span>
        <button onclick="check('${id}')">Check</button>
    `;
    document.getElementById("projectList").appendChild(div);
}

async function check(id) {
    let res = await fetch("/build-status/" + id);
    let data = await res.json();

    if(data.status === "done") {
        alert("✅ Ready!");
    } else {
        alert("⏳ Still building...");
    }
}

/* LOAD ANALYTICS */
async function loadStats() {
    let res = await fetch("/analytics");
    let data = await res.json();

    document.getElementById("projects").innerText = data.projects;
    document.getElementById("revenue").innerText = data.revenue;
}

loadStats();

</script>

</body>
</html>
