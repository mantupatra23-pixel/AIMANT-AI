<!DOCTYPE html>
<html>
<body style="font-family:Arial; padding:40px;">

<h2>🌐 Add Custom Domain</h2>

<input id="domain" placeholder="yourdomain.com" style="padding:10px;">
<button onclick="add()">Add</button>

<script>
async function add(){
    let domain = document.getElementById("domain").value;

    let res = await fetch("/add-domain?bid=latest&domain=" + domain, {
        method:"POST"
    });

    let data = await res.json();
    alert(data.msg);
}
</script>

</body>
</html>
